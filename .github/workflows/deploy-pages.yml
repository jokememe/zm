# 推送到 main/master → 构建并部署到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # 生产子路径 /zm/，保证 JS/CSS 从正确 URL 加载
          GITHUB_PAGES: 'true'
          VITE_BASE: /zm/
        run: npm run build

      - name: Verify dist is production build
        run: |
          test -f dist/index.html
          test -d dist/assets
          # 源码入口不应出现在生产 index（否则会白屏）
          if grep -q '/src/main.ts' dist/index.html; then
            echo "::error::dist/index.html still points to /src/main.ts — not a Vite production build"
            cat dist/index.html
            exit 1
          fi
          grep -q 'assets/' dist/index.html
          echo "dist OK:"
          head -n 30 dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
